name: Publish Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        if: github.event_name == 'push'
        run: node -e 'const version=require("./package.json").version; const tag=process.env.GITHUB_REF_NAME.replace(/^v/,""); if (version !== tag) { console.error("Tag " + process.env.GITHUB_REF_NAME + " does not match package version " + version); process.exit(1); }'

      - name: Run release checks
        run: npm run release:check

      - name: Dry run publish
        if: github.event_name == 'workflow_dispatch'
        run: npm run release:dry-run

      - name: Publish to npm
        if: github.event_name == 'push'
        run: npm publish --access public --tag latest
